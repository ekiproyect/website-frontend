<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect para fuentes de Google (acelera DNS + TLS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload de fuente crítica Inter (usada en todo el sitio) -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      />
    </noscript>
    
    <title>EKI · Diseño y Desarrollo de Software Premium | Antofagasta, Chile</title>
    <meta name="description" content="EKI es una consultora digital de Antofagasta que combina diseño de alta gama con ingeniería robusta. Desarrollo web y móvil a medida, cloud, SEO técnico y performance para marcas que quieren convertir y escalar." />
    <meta name="author" content="EKI" />
    <meta name="keywords" content="consultora de software, desarrollo web premium, diseño web alta gama, desarrollo a medida, aplicaciones móviles, cloud, SEO técnico, Antofagasta, Chile" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.ekiproject.cl/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="EKI" />
    <meta property="og:title" content="EKI · Diseño y Desarrollo de Software Premium" />
    <meta property="og:description" content="Combinamos diseño de alta gama con ingeniería robusta. Desde Antofagasta hacia el mundo." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ekiproject.cl/" />
    <meta property="og:locale" content="es_CL" />
    <meta property="og:image" content="https://www.ekiproject.cl/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="EKI · Diseño y Desarrollo de Software Premium" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EKI · Diseño y Desarrollo de Software Premium" />
    <meta name="twitter:description" content="Combinamos diseño de alta gama con ingeniería robusta. Desde Antofagasta hacia el mundo." />
    <meta name="twitter:image" content="https://www.ekiproject.cl/og-image.jpg" />

    <!-- Datos estructurados (JSON-LD) para buscadores -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "EKI",
        "url": "https://www.ekiproject.cl/",
        "logo": "https://www.ekiproject.cl/og-image.jpg",
        "description": "Consultora digital de desarrollo de software y diseño web premium.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Antofagasta",
          "addressCountry": "CL"
        },
        "sameAs": [
          "https://www.instagram.com/ekiproject",
          "https://www.linkedin.com/company/ekiproject"
        ]
      }
    </script>
  </head>

  <body>
    <!-- Script inline para forzar scroll al inicio INMEDIATAMENTE -->
    <script>
      // Prevenir que el navegador restaure la posición de scroll
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      // Forzar scroll al inicio
      window.scrollTo(0, 0);
      // También al cargar el DOM
      document.addEventListener('DOMContentLoaded', function() {
        window.scrollTo(0, 0);
      });
      // Y cuando la página esté completamente cargada
      window.addEventListener('load', function() {
        window.scrollTo(0, 0);
      });
    </script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
